version: "3.9"

services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "8081:8080"
    env_file:
      - ./api-gateway/.env.example
    depends_on:
      - auth-service
      - patient-service
      - doctor-service
      - appointment-service
      - notification-service
      - payment-service
      - telemedicine-service
      - ai-service

  auth-service:
    build: ./services/auth-service
    ports:
      - "8001:8001"
    env_file:
      - ./services/auth-service/.env.example

  patient-service:
    build: ./services/patient-service
    ports:
      - "8002:8002"
    env_file:
      - ./services/patient-service/.env.example

  doctor-service:
    build: ./services/doctor-service
    ports:
      - "8003:8003"
    env_file:
      - ./services/doctor-service/.env.example

  appointment-service:
    build: ./services/appointment-service
    ports:
      - "8004:8004"
    env_file:
      - ./services/appointment-service/.env.example

  notification-service:
    build: ./services/notification-service
    ports:
      - "8005:8005"
    env_file:
      - ./services/notification-service/.env.example

  payment-service:
    build: ./services/payment-service
    ports:
      - "8006:8006"
    env_file:
      - ./services/payment-service/.env.example

  telemedicine-service:
    build: ./services/telemedicine-service
    ports:
      - "8007:8007"
    env_file:
      - ./services/telemedicine-service/.env.example

  ai-service:
    build: ./services/ai-service
    ports:
      - "8008:8008"
    env_file:
      - ./services/ai-service/.env.example
